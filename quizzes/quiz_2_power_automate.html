<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 2 — Power Automate for Oil & Gas</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; background: linear-gradient(135deg, #0F4C5C 0%, #1F7A8C 100%); min-height: 100vh; padding: 30px 16px; color: #1a1a1a; }
  .container { max-width: 820px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 16px 48px rgba(0,0,0,0.18); overflow: hidden; }
  header { background: #0F4C5C; color: #fff; padding: 28px 32px; }
  header h1 { margin: 0 0 6px 0; font-size: 22px; }
  header p { margin: 0; opacity: 0.85; font-size: 14px; }
  .main { padding: 28px 32px; }
  .progress-bar { background: #e5e7eb; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 28px; }
  .progress-fill { background: #0F4C5C; height: 100%; width: 0%; transition: width 0.4s ease; }
  .question { display: none; animation: fadeIn 0.4s ease; }
  .question.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .q-meta { color: #6b7280; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .q-text { font-size: 18px; font-weight: 600; margin: 0 0 6px 0; color: #111; }
  .options { margin: 0; padding: 0; list-style: none; }
  .option { background: #fff; border: 2px solid #e5e7eb; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.18s ease; font-size: 15px; line-height: 1.45; user-select: none; }
  .option:hover { border-color: #1F7A8C; background: #f0fafe; }
  .option.selected { border-color: #1F7A8C; background: #e0f5fa; }
  .option.correct { border-color: #16a34a; background: #dcfce7; cursor: default; }
  .option.wrong { border-color: #dc2626; background: #fee2e2; cursor: default; }
  .option.disabled { cursor: default; opacity: 0.7; }
  .feedback { margin-top: 14px; padding: 14px 16px; border-radius: 8px; font-size: 14px; line-height: 1.55; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
  .feedback.wrong { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .nav { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
  button { background: #0F4C5C; color: #fff; border: 0; padding: 11px 22px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s ease; }
  button:hover:not(:disabled) { background: #1F7A8C; transform: translateY(-1px); }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  button.secondary { background: #e5e7eb; color: #374151; }
  button.secondary:hover:not(:disabled) { background: #d1d5db; transform: translateY(-1px); }
  .results { text-align: center; padding: 30px 20px; display: none; }
  .results.show { display: block; }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; background: linear-gradient(135deg, #0F4C5C, #1F7A8C); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 8px 24px rgba(15,76,92,0.3); }
  .score-circle .pct { font-size: 36px; font-weight: 700; }
  .score-circle .frac { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .results h2 { margin: 0 0 8px 0; color: #111; }
  .results .verdict { color: #4b5563; font-size: 15px; margin-bottom: 20px; }
  .review { text-align: left; background: #f9fafb; border-radius: 8px; padding: 16px 20px; margin-top: 18px; font-size: 14px; }
  .review h3 { margin: 0 0 10px 0; font-size: 15px; color: #374151; }
  .review-item { padding: 8px 0; border-bottom: 1px solid #e5e7eb; display: flex; align-items: flex-start; gap: 10px; }
  .review-item:last-child { border-bottom: 0; }
  .review-mark { font-size: 18px; flex-shrink: 0; line-height: 1.3; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Quiz 2 — Power Automate for Oil &amp; Gas</h1>
    <p>10 questions · Tests your understanding of Module 02 · No time limit</p>
  </header>
  <div class="main">
    <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
    <div id="quiz"></div>
    <div class="results" id="results">
      <div class="score-circle"><div class="pct" id="scorePct">0%</div><div class="frac" id="scoreFrac">0 / 10</div></div>
      <h2 id="verdictTitle">Well done</h2>
      <div class="verdict" id="verdictText"></div>
      <div class="review"><h3>Question Review</h3><div id="reviewList"></div></div>
      <button onclick="restart()" style="margin-top: 20px;">Try Again</button>
    </div>
  </div>
</div>
<script>
const questions = [
  {
    q: "Every Power Automate flow consists of:",
    options: [
      "One trigger and one action only.",
      "One trigger plus one or more actions (and optionally conditions, loops, variables).",
      "Multiple triggers and one action.",
      "Pure SQL queries."
    ],
    correct: 1,
    explain: "One trigger fires the flow; one or more actions perform the work. Conditions and loops control flow. This is the universal structure."
  },
  {
    q: "Power Automate's Excel connector can only read data from:",
    options: [
      "Any cell range in any spreadsheet.",
      "Named Tables in Excel files stored in OneDrive or SharePoint.",
      "CSV files only.",
      "Only password-protected workbooks."
    ],
    correct: 1,
    explain: "The Excel Online connector reads named Tables only. Before building a flow that uses Excel, ALWAYS convert your data range to a Table (Insert → Table). This is the single most common stumbling block."
  },
  {
    q: "You build an approval flow. Which action is correct for 'wait for human decision'?",
    options: [
      "Send email — yes/no",
      "Approvals → Start and wait for an approval",
      "Compose — request approval",
      "Variable → Set to approval-needed"
    ],
    correct: 1,
    explain: "The Approvals connector's 'Start and wait for an approval' action is purpose-built. It tracks responses, captures comments, supports the Power Automate mobile app, and integrates with the audit log."
  },
  {
    q: "Your first run of a new flow should ALWAYS:",
    options: [
      "Use live production data so you find real bugs.",
      "Be sent to your CEO for sign-off.",
      "Use test data and test recipients — pre-prod discipline.",
      "Be a Tuesday afternoon."
    ],
    correct: 2,
    explain: "Test mode first. Always. The Automation Red List rule: never point a new flow at live data on first run. Use a test mailbox and test list until you're confident."
  },
  {
    q: "Which Power Automate connector is FREE (no Premium licence needed)?",
    options: [
      "HTTP — make arbitrary REST calls",
      "SAP ERP",
      "Office 365 Outlook + SharePoint + Excel + Teams (the office basics)",
      "Custom Connector for in-house APIs"
    ],
    correct: 2,
    explain: "The core office connectors are included with M365. HTTP, SAP, custom connectors, and AI Builder all require Premium licensing. Start with the free tier; promote to Premium when ROI is clear."
  },
  {
    q: "Your flow ran 500 times last week and sent 500 emails to your CEO by mistake. What's the FIRST control you should have built in?",
    options: [
      "A confidence score",
      "A kill switch — a way to disable the flow without deleting it",
      "More tests",
      "A backup of the emails"
    ],
    correct: 1,
    explain: "Every production flow needs a kill switch — typically a SharePoint flag the flow checks. If it's true, the flow exits cleanly. No-code, no IT involvement, panic-button accessible."
  },
  {
    q: "Where do you find out WHY a Power Automate flow failed?",
    options: [
      "Email the Microsoft CEO",
      "The flow's Run history tab — every step shows green/red and the exact error",
      "Restart your laptop",
      "Try again in a different browser"
    ],
    correct: 1,
    explain: "Run history is your debugger. Every step expandable, full input/output visible, exact error messages shown. Read it carefully before assuming the bug is hard."
  },
  {
    q: "You want to react to incoming vendor invoices in Outlook but NOT every other email. The cleanest pattern is:",
    options: [
      "Trigger on every email; filter by subject in the flow.",
      "Set up an Outlook rule to move invoice emails to a dedicated folder, then trigger on that folder only.",
      "Read every email and use AI to classify.",
      "Hire an intern."
    ],
    correct: 1,
    explain: "Folder-scoped triggers are far more efficient than 'trigger on everything then filter'. Outlook rules + Power Automate folder triggers is the cleanest pattern. The intake layer should be narrow, not wide."
  },
  {
    q: "Why must payment file generation (bank file upload) stay manual even after AI extraction and 3-way match?",
    options: [
      "Because Power Automate can't do it.",
      "Because Treasury accountability and State Bank circular compliance require a named human signing off the file — the Automation Red List explicitly forbids auto-payment.",
      "Because banks don't accept automated files.",
      "Because manual is more fun."
    ],
    correct: 1,
    explain: "Treasury sign-off, State Bank compliance, and FBR scrutiny all require a named accountable human. Power Automate can prepare everything to 'ready to release' — but a person hits 'send'. Same rule as OGRA disclosures: drafts automate, submissions don't."
  },
  {
    q: "You build a flow that worked perfectly in testing. After two weeks in production, it starts failing 10% of the time. Most likely cause?",
    options: [
      "Power Automate is broken.",
      "Edge cases you didn't test — unusual file types, special characters in names, empty fields, very large attachments, weekend timing.",
      "The flow needs more sleep.",
      "Someone changed the law."
    ],
    correct: 1,
    explain: "Production traffic exposes edge cases test data never hits. Plan for: empty fields, unicode characters, oversized attachments, weekends/holidays, network blips, downstream system maintenance windows. Resilient flows expect failure and degrade gracefully."
  }
];
let current = 0;
let answers = new Array(questions.length).fill(null);
const quizEl = document.getElementById('quiz');
const barEl = document.getElementById('bar');
const resultsEl = document.getElementById('results');
function render() {
  if (current >= questions.length) { showResults(); return; }
  const q = questions[current];
  const selected = answers[current];
  const answered = selected !== null;
  quizEl.innerHTML = `<div class="question active">
    <div class="q-meta">Question ${current + 1} of ${questions.length}</div>
    <div class="q-text">${q.q}</div>
    <ul class="options">${q.options.map((opt, i) => {
      let cls = 'option';
      if (answered) { cls += ' disabled'; if (i === q.correct) cls += ' correct'; else if (i === selected) cls += ' wrong'; }
      else if (selected === i) cls += ' selected';
      return `<li class="${cls}" onclick="pick(${i})">${String.fromCharCode(65 + i)}. ${opt}</li>`;
    }).join('')}</ul>
    ${answered ? `<div class="feedback ${selected === q.correct ? 'correct' : 'wrong'} show"><strong>${selected === q.correct ? '✓ Correct' : '✗ Not quite'}</strong>${q.explain}</div>` : ''}
    <div class="nav">
      <button class="secondary" onclick="prev()" ${current === 0 ? 'disabled' : ''}>← Previous</button>
      <button onclick="next()" ${!answered ? 'disabled' : ''}>${current === questions.length - 1 ? 'See Results →' : 'Next →'}</button>
    </div></div>`;
  barEl.style.width = ((current + (answered ? 1 : 0)) / questions.length * 100) + '%';
}
function pick(i) { if (answers[current] !== null) return; answers[current] = i; render(); }
function next() { if (answers[current] === null) return; current++; if (current >= questions.length) showResults(); else render(); }
function prev() { if (current > 0) { current--; render(); } }
function showResults() {
  quizEl.style.display = 'none';
  resultsEl.classList.add('show');
  const score = answers.filter((a, i) => a === questions[i].correct).length;
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scoreFrac').textContent = score + ' / ' + questions.length;
  let verdict;
  if (pct === 100) verdict = "Perfect — you're ready to build production-grade flows safely.";
  else if (pct >= 80) verdict = "Strong — review the explanations and you're set for real flows.";
  else if (pct >= 60) verdict = "Solid — re-read Module 02 walkthroughs and try the build-a-flow activity.";
  else verdict = "Worth a careful re-read of Module 02 before building anything in production.";
  document.getElementById('verdictText').textContent = verdict;
  document.getElementById('reviewList').innerHTML = questions.map((q, i) => {
    const ok = answers[i] === q.correct;
    return `<div class="review-item"><span class="review-mark">${ok ? '✓' : '✗'}</span><div><strong>Q${i+1}.</strong> ${q.q.substring(0, 90)}${q.q.length > 90 ? '…' : ''}</div></div>`;
  }).join('');
  barEl.style.width = '100%';
}
function restart() { current = 0; answers = new Array(questions.length).fill(null); quizEl.style.display = 'block'; resultsEl.classList.remove('show'); render(); }
render();
</script>
</body>
</html>
