<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Assessment — Day 2: Automation & Agentic Systems</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; background: linear-gradient(135deg, #134611 0%, #2E7D32 100%); min-height: 100vh; padding: 30px 16px; color: #1a1a1a; }
  .container { max-width: 820px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 16px 48px rgba(0,0,0,0.2); overflow: hidden; }
  header { background: #134611; color: #fff; padding: 28px 32px; }
  header h1 { margin: 0 0 6px 0; font-size: 22px; }
  header p { margin: 0; opacity: 0.85; font-size: 14px; }
  .badge { display: inline-block; background: rgba(255,255,255,0.18); color: #fff; padding: 3px 10px; border-radius: 999px; font-size: 12px; margin-left: 8px; letter-spacing: 0.4px; }
  .main { padding: 28px 32px; }
  .progress-bar { background: #e5e7eb; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 28px; }
  .progress-fill { background: #2E7D32; height: 100%; width: 0%; transition: width 0.4s ease; }
  .question { display: none; animation: fadeIn 0.4s ease; }
  .question.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .q-meta { color: #6b7280; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; justify-content: space-between; }
  .q-cat { color: #2E7D32; font-weight: 600; }
  .q-text { font-size: 18px; font-weight: 600; margin: 0 0 6px 0; color: #111; }
  .options { margin: 0; padding: 0; list-style: none; }
  .option { background: #fff; border: 2px solid #e5e7eb; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.18s ease; font-size: 15px; line-height: 1.45; user-select: none; }
  .option:hover { border-color: #2E7D32; background: #f0fdf4; }
  .option.selected { border-color: #2E7D32; background: #dcfce7; }
  .option.correct { border-color: #16a34a; background: #dcfce7; cursor: default; }
  .option.wrong { border-color: #dc2626; background: #fee2e2; cursor: default; }
  .option.disabled { cursor: default; opacity: 0.7; }
  .feedback { margin-top: 14px; padding: 14px 16px; border-radius: 8px; font-size: 14px; line-height: 1.55; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
  .feedback.wrong { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .nav { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
  button { background: #134611; color: #fff; border: 0; padding: 11px 22px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s ease; }
  button:hover:not(:disabled) { background: #2E7D32; transform: translateY(-1px); }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  button.secondary { background: #e5e7eb; color: #374151; }
  button.secondary:hover:not(:disabled) { background: #d1d5db; transform: translateY(-1px); }
  .results { text-align: center; padding: 30px 20px; display: none; }
  .results.show { display: block; }
  .score-circle { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, #134611, #2E7D32); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 10px 28px rgba(19,70,17,0.35); }
  .score-circle .pct { font-size: 40px; font-weight: 700; }
  .score-circle .frac { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .results h2 { margin: 0 0 8px 0; color: #111; }
  .results .verdict { color: #4b5563; font-size: 15px; margin-bottom: 20px; max-width: 580px; margin-left: auto; margin-right: auto; }
  .cert-banner { display: inline-block; background: linear-gradient(135deg, #FEF3C7, #FDE68A); color: #78350F; padding: 12px 20px; border-radius: 8px; font-weight: 600; margin: 12px 0; border: 1px solid #FCD34D; }
  .cat-breakdown { background: #f9fafb; border-radius: 8px; padding: 16px 20px; margin: 18px 0; text-align: left; }
  .cat-breakdown h3 { margin: 0 0 12px 0; font-size: 15px; color: #374151; }
  .cat-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
  .cat-row:last-child { border-bottom: 0; }
  .cat-row strong { color: #2E7D32; }
  .review { text-align: left; background: #f9fafb; border-radius: 8px; padding: 16px 20px; margin-top: 18px; font-size: 14px; }
  .review h3 { margin: 0 0 10px 0; font-size: 15px; color: #374151; }
  .review-item { padding: 8px 0; border-bottom: 1px solid #e5e7eb; display: flex; align-items: flex-start; gap: 10px; }
  .review-item:last-child { border-bottom: 0; }
  .review-mark { font-size: 18px; flex-shrink: 0; line-height: 1.3; }
  .review-cat { color: #9ca3af; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Final Assessment <span class="badge">Day 2</span></h1>
    <p>15 questions across all modules · Aim for 80%+ to demonstrate proficiency</p>
  </header>
  <div class="main">
    <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
    <div id="quiz"></div>
    <div class="results" id="results">
      <div class="score-circle"><div class="pct" id="scorePct">0%</div><div class="frac" id="scoreFrac">0 / 15</div></div>
      <h2 id="verdictTitle">Assessment Complete</h2>
      <div class="verdict" id="verdictText"></div>
      <div id="certBanner"></div>
      <div class="cat-breakdown"><h3>By Topic</h3><div id="catBreakdown"></div></div>
      <div class="review"><h3>Question Review</h3><div id="reviewList"></div></div>
      <button onclick="restart()" style="margin-top: 20px;">Retake Assessment</button>
    </div>
  </div>
</div>
<script>
const questions = [
  { category: "Process Mapping", q: "First step in mapping any process for automation:",
    options: ["Open Visio", "Walk the process — talk to the people who actually do it", "Estimate the budget", "Call IT"],
    correct: 1, explain: "Walking the process surfaces shadow Excel, rework loops, and friction managers don't see. Always step 1." },
  { category: "Automation Red List", q: "Which action should NEVER be fully automated, even with AI?",
    options: ["Internal reminder emails", "Auto-submission of OGRA Section 26 disclosures", "Posting summaries to a team Teams channel", "Logging events to an audit list"],
    correct: 1, explain: "Regulator submissions stay manual. Drafts can be AI-assisted; submission needs a named human signature for personal accountability." },
  { category: "Power Automate", q: "The most important habit when testing a new Power Automate flow:",
    options: ["Point at production data immediately", "Test against a test mailbox/list with mock data first; promote only after 5+ successful runs across edge cases", "Skip testing — trust the platform", "Wait for a Friday"],
    correct: 1, explain: "Test-mode-first is non-negotiable. Live data on first run is how flows accidentally email 5,000 customers. Always pre-prod first." },
  { category: "AI Document Reading", q: "Most important field to add to any AI extraction prompt:",
    options: ["A request for poetry", "Confidence score + 'use null/placeholder for missing fields, never invent'", "An emoji", "An apology"],
    correct: 1, explain: "Confidence + anti-hallucination together produce trustworthy extractions. Without them, the AI fills missing fields with plausible-sounding guesses." },
  { category: "Process Mapping", q: "You spot a process step where someone copies data from email to SAP by hand. What's it called?",
    options: ["Best practice", "Swivel-chair work — classic automation candidate", "Strategic data entry", "Manual QA"],
    correct: 1, explain: "Swivel-chair work — copying between systems that don't talk. Bridge them with a connector or flow." },
  { category: "Power Automate", q: "The Excel Online connector can only read from:",
    options: ["Any cell range", "Named Tables (Insert → Table)", "CSV files only", "Password-protected files only"],
    correct: 1, explain: "Convert your data range to a Table BEFORE building any flow that reads Excel. Single most common stumbling block." },
  { category: "AI Document Reading", q: "AI extracts an invoice; total amount disagrees with the corresponding PO by 15%. Right action:",
    options: ["Auto-approve", "Route to AP Supervisor for variance investigation", "Auto-reject and delete", "Pay both"],
    correct: 1, explain: "Variance triggers human review. AI's job is to surface exceptions; humans decide on exceptions." },
  { category: "Automation Red List", q: "Why must payment file release stay manual?",
    options: ["Banks don't accept automation", "Treasury accountability and State Bank compliance require named human sign-off; Red List explicitly forbids auto-payment", "Power Automate can't do it", "It's faster manually"],
    correct: 1, explain: "Treasury sign-off and State Bank circulars require named accountable humans. AI prepares; humans release." },
  { category: "Process Mapping", q: "What is the SIPOC of a process?",
    options: ["Suppliers, Inputs, Process, Outputs, Customers", "Systems, Information, Procedures, Operators, Controls", "Standard Inputs, Procedures, Outputs, Customers", "Stakeholders, Issues, Plans, Owners, Costs"],
    correct: 0, explain: "Suppliers · Inputs · Process · Outputs · Customers. Always do this BEFORE the detailed swim-lane." },
  { category: "Power Automate", q: "You build a flow that worked in testing. Two weeks in production it fails 10% of the time. Most likely cause:",
    options: ["The platform is broken", "Edge cases your test data didn't hit — empty fields, special characters, large attachments, weekend timing", "Power Automate needs sleep", "Someone changed the law"],
    correct: 1, explain: "Production traffic exposes edge cases. Plan for empty fields, unicode, oversize attachments, weekends, network blips, downstream maintenance windows." },
  { category: "AI Document Reading", q: "AI Builder for invoice extraction lives where?",
    options: ["Inside Word", "Inside Power Automate (Premium licence required)", "Inside Excel", "Inside SAP"],
    correct: 1, explain: "AI Builder is a Premium add-on to Power Automate. Pre-trained models for invoices, receipts, OCR, business cards. ~$500/month for 1M credits." },
  { category: "Automation Red List", q: "An automated flow that runs 10 times has small blast radius. One that runs 10,000 times needs:",
    options: ["No additional testing", "Heavy edge-case testing + kill switch + audit log + failure alerts", "Less testing", "A bigger laptop"],
    correct: 1, explain: "Scale magnifies both value AND risk. The Five Automation Rules: reversibility first, internal first, sample size matters, audit log everywhere, kill switch ready." },
  { category: "Process Mapping", q: "The killer use case for automation in maintenance:",
    options: ["Auto-deleting closed work orders", "Permit-to-Work workflows — HSE + Maintenance + Operations digital approval chain", "Auto-assigning technicians", "Predicting weather"],
    correct: 1, explain: "PTW touches HSE/Maintenance/Operations daily, is paper-based and error-prone today, and yields massive cycle-time savings when digital. Build this first in maintenance." },
  { category: "Capstone", q: "What's the right structure for an end-to-end automated invoice workflow?",
    options: ["Email arrives → AI auto-pays. Done.", "Email → Save → AI extracts → 3-way match → variance handling or approval routing → human releases payment → audit log", "All manual", "All automated, no humans"],
    correct: 1, explain: "End-to-end with human-in-the-loop at the release. This is the pattern Aramco/ADNOC/Shell are deploying — and the capstone target for Day 2." },
  { category: "Mindset", q: "What changes Day 2 vs Day 1 in your relationship with AI?",
    options: ["Nothing — same tools", "Day 1 taught you to USE AI; Day 2 teaches you to EMBED AI into how work actually happens — moving from 'asking' to 'building'", "Day 2 replaces Day 1", "Day 2 is optional"],
    correct: 1, explain: "Day 1: thinking-with-AI. Day 2: doing-with-AI. The ratio of 'knowing about' to 'building with' separates leaders from observers over the next 18 months." }
];
let current = 0;
let answers = new Array(questions.length).fill(null);
const quizEl = document.getElementById('quiz');
const barEl = document.getElementById('bar');
const resultsEl = document.getElementById('results');
function render() {
  if (current >= questions.length) { showResults(); return; }
  const q = questions[current];
  const selected = answers[current];
  const answered = selected !== null;
  quizEl.innerHTML = `<div class="question active">
    <div class="q-meta"><span>Question ${current + 1} of ${questions.length}</span><span class="q-cat">${q.category}</span></div>
    <div class="q-text">${q.q}</div>
    <ul class="options">${q.options.map((opt, i) => {
      let cls = 'option';
      if (answered) { cls += ' disabled'; if (i === q.correct) cls += ' correct'; else if (i === selected) cls += ' wrong'; }
      else if (selected === i) cls += ' selected';
      return `<li class="${cls}" onclick="pick(${i})">${String.fromCharCode(65 + i)}. ${opt}</li>`;
    }).join('')}</ul>
    ${answered ? `<div class="feedback ${selected === q.correct ? 'correct' : 'wrong'} show"><strong>${selected === q.correct ? '✓ Correct' : '✗ Not quite'}</strong>${q.explain}</div>` : ''}
    <div class="nav">
      <button class="secondary" onclick="prev()" ${current === 0 ? 'disabled' : ''}>← Previous</button>
      <button onclick="next()" ${!answered ? 'disabled' : ''}>${current === questions.length - 1 ? 'Submit Assessment →' : 'Next →'}</button>
    </div></div>`;
  barEl.style.width = ((current + (answered ? 1 : 0)) / questions.length * 100) + '%';
}
function pick(i) { if (answers[current] !== null) return; answers[current] = i; render(); }
function next() { if (answers[current] === null) return; current++; if (current >= questions.length) showResults(); else render(); }
function prev() { if (current > 0) { current--; render(); } }
function showResults() {
  quizEl.style.display = 'none';
  resultsEl.classList.add('show');
  const score = answers.filter((a, i) => a === questions[i].correct).length;
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scoreFrac').textContent = score + ' / ' + questions.length;
  let verdict, cert = '';
  if (pct >= 90) { verdict = "Exceptional — you have a comprehensive grasp of Day 2 material. You are equipped to design and deploy automation safely and effectively."; cert = '<div class="cert-banner">🏆 Day 2 Distinction · Proficient Builder</div>'; }
  else if (pct >= 80) { verdict = "Strong — you have a working command of the material. Review the explanations on missed questions and you'll be set."; cert = '<div class="cert-banner">✅ Day 2 Pass · Competent Builder</div>'; }
  else if (pct >= 60) { verdict = "Solid foundation but more practice needed. Re-read the modules covering your missed questions, then retake."; }
  else { verdict = "Worth a careful re-read of the modules before building anything in production. Particular attention to the Automation Red List and human-in-the-loop discipline."; }
  document.getElementById('verdictText').textContent = verdict;
  document.getElementById('certBanner').innerHTML = cert;
  const catScores = {};
  questions.forEach((q, i) => {
    if (!catScores[q.category]) catScores[q.category] = { correct: 0, total: 0 };
    catScores[q.category].total++;
    if (answers[i] === q.correct) catScores[q.category].correct++;
  });
  document.getElementById('catBreakdown').innerHTML = Object.entries(catScores).map(([cat, s]) => `<div class="cat-row"><span>${cat}</span><strong>${s.correct} / ${s.total}</strong></div>`).join('');
  document.getElementById('reviewList').innerHTML = questions.map((q, i) => {
    const ok = answers[i] === q.correct;
    return `<div class="review-item"><span class="review-mark">${ok ? '✓' : '✗'}</span><div><div class="review-cat">${q.category}</div><strong>Q${i+1}.</strong> ${q.q.substring(0, 90)}${q.q.length > 90 ? '…' : ''}</div></div>`;
  }).join('');
  barEl.style.width = '100%';
}
function restart() { current = 0; answers = new Array(questions.length).fill(null); quizEl.style.display = 'block'; resultsEl.classList.remove('show'); render(); }
render();
</script>
</body>
</html>
