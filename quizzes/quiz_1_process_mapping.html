<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 1 — Process Mapping for Oil & Gas</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; background: linear-gradient(135deg, #0F4C5C 0%, #1F7A8C 100%); min-height: 100vh; padding: 30px 16px; color: #1a1a1a; }
  .container { max-width: 820px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 16px 48px rgba(0,0,0,0.18); overflow: hidden; }
  header { background: #0F4C5C; color: #fff; padding: 28px 32px; }
  header h1 { margin: 0 0 6px 0; font-size: 22px; }
  header p { margin: 0; opacity: 0.85; font-size: 14px; }
  .main { padding: 28px 32px; }
  .progress-bar { background: #e5e7eb; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 28px; }
  .progress-fill { background: #0F4C5C; height: 100%; width: 0%; transition: width 0.4s ease; }
  .question { display: none; animation: fadeIn 0.4s ease; }
  .question.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .q-meta { color: #6b7280; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .q-text { font-size: 18px; font-weight: 600; margin: 0 0 6px 0; color: #111; }
  .options { margin: 0; padding: 0; list-style: none; }
  .option { background: #fff; border: 2px solid #e5e7eb; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.18s ease; font-size: 15px; line-height: 1.45; user-select: none; }
  .option:hover { border-color: #1F7A8C; background: #f0fafe; }
  .option.selected { border-color: #1F7A8C; background: #e0f5fa; }
  .option.correct { border-color: #16a34a; background: #dcfce7; cursor: default; }
  .option.wrong { border-color: #dc2626; background: #fee2e2; cursor: default; }
  .option.disabled { cursor: default; opacity: 0.7; }
  .feedback { margin-top: 14px; padding: 14px 16px; border-radius: 8px; font-size: 14px; line-height: 1.55; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
  .feedback.wrong { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .nav { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
  button { background: #0F4C5C; color: #fff; border: 0; padding: 11px 22px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s ease; }
  button:hover:not(:disabled) { background: #1F7A8C; transform: translateY(-1px); }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  button.secondary { background: #e5e7eb; color: #374151; }
  button.secondary:hover:not(:disabled) { background: #d1d5db; transform: translateY(-1px); }
  .results { text-align: center; padding: 30px 20px; display: none; }
  .results.show { display: block; }
  .score-circle { width: 140px; height: 140px; border-radius: 50%; background: linear-gradient(135deg, #0F4C5C, #1F7A8C); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 8px 24px rgba(15,76,92,0.3); }
  .score-circle .pct { font-size: 36px; font-weight: 700; }
  .score-circle .frac { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .results h2 { margin: 0 0 8px 0; color: #111; }
  .results .verdict { color: #4b5563; font-size: 15px; margin-bottom: 20px; }
  .review { text-align: left; background: #f9fafb; border-radius: 8px; padding: 16px 20px; margin-top: 18px; font-size: 14px; }
  .review h3 { margin: 0 0 10px 0; font-size: 15px; color: #374151; }
  .review-item { padding: 8px 0; border-bottom: 1px solid #e5e7eb; display: flex; align-items: flex-start; gap: 10px; }
  .review-item:last-child { border-bottom: 0; }
  .review-mark { font-size: 18px; flex-shrink: 0; line-height: 1.3; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Quiz 1 — Process Mapping for Oil &amp; Gas</h1>
    <p>10 questions · Tests your understanding of Module 01 · No time limit</p>
  </header>
  <div class="main">
    <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
    <div id="quiz"></div>
    <div class="results" id="results">
      <div class="score-circle"><div class="pct" id="scorePct">0%</div><div class="frac" id="scoreFrac">0 / 10</div></div>
      <h2 id="verdictTitle">Well done</h2>
      <div class="verdict" id="verdictText"></div>
      <div class="review"><h3>Question Review</h3><div id="reviewList"></div></div>
      <button onclick="restart()" style="margin-top: 20px;">Try Again</button>
    </div>
  </div>
</div>
<script>
const questions = [
  {
    q: "What does SIPOC stand for?",
    options: [
      "Standard Inputs, Procedures, Outputs, Customers",
      "Suppliers, Inputs, Process, Outputs, Customers",
      "Systems, Information, Procedures, Operators, Controls",
      "Stakeholders, Issues, Plans, Owners, Costs"
    ],
    correct: 1,
    explain: "Suppliers · Inputs · Process · Outputs · Customers. The 30,000-ft view of any process. Always do this BEFORE the detailed swim-lane."
  },
  {
    q: "You're mapping a procurement process. You list all 18 steps in the 'Process' column of SIPOC. What went wrong?",
    options: [
      "Nothing — that's the right way to do SIPOC.",
      "SIPOC is the high-level view — keep 'Process' to 5-7 major steps. Detailed steps belong in the swim-lane.",
      "You forgot the suppliers column.",
      "18 steps is fine; some processes have 50."
    ],
    correct: 1,
    explain: "SIPOC is the executive view. 5-7 major steps maximum. The 18 detailed steps belong in the swim-lane, the next level of detail."
  },
  {
    q: "Which of these is the BEST automation candidate in a maintenance work-order process?",
    options: [
      "Physical isolation of equipment by Operations (Step 10)",
      "Quality check of completed work by Maintenance Supervisor (Step 12)",
      "Routing of newly-created work orders to the right planner based on category (Step 3)",
      "Final return-to-service authorisation by Operations (Step 13)"
    ],
    correct: 2,
    explain: "Auto-routing by category is high-frequency, low-risk, fully reversible — classic Power Automate win. Physical work and final authorisations must stay human."
  },
  {
    q: "You spot a step where someone copies data from email into SAP by hand 100 times a month. What's this called?",
    options: [
      "Best practice",
      "Swivel-chair work — a classic automation candidate",
      "Manual quality assurance",
      "Strategic data entry"
    ],
    correct: 1,
    explain: "Swivel-chair work — manual copying between systems that don't talk to each other. Build a connector or a flow to bridge them."
  },
  {
    q: "Which step in an HSE incident process should NEVER be fully automated?",
    options: [
      "Initial SMS alert to senior management within 5 minutes",
      "Starting a 48-hour OGRA countdown timer",
      "Submission of the OGRA Section 26 disclosure",
      "Reminders to CAPA action owners"
    ],
    correct: 2,
    explain: "Regulator submissions stay manual. The disclosure DRAFT can be AI-assisted, but the submission requires a named human signing off. Same principle for FBR filings, PPRA exemption requests, and SECP submissions."
  },
  {
    q: "Why is 'shadow Excel' (an unofficial spreadsheet everyone really uses) important to capture in your process map?",
    options: [
      "It isn't — you should map only the official process.",
      "It's the most important thing to capture because it represents what people actually do, which is what you must automate (or kill).",
      "Shadow Excel is illegal under PECA 2016.",
      "Only IT should see it."
    ],
    correct: 1,
    explain: "Map what actually happens, not what should happen. Shadow Excel is a signal that the official tool isn't working — either fix it or formalise the Excel as the official tool."
  },
  {
    q: "A swim-lane diagram has rows for roles and systems. Columns are usually:",
    options: [
      "Sequence (time order of steps)",
      "Cost categories",
      "Vendors",
      "Geographical locations"
    ],
    correct: 0,
    explain: "Swim-lane: rows = roles/systems, columns = time. Steps appear in the right lane at the right time, with arrows showing handoffs."
  },
  {
    q: "What is the killer use case for automation in maintenance, per Day 2?",
    options: [
      "Auto-creating work orders from temperature alerts",
      "Permit-to-Work workflows — combining HSE + Maintenance + Operations approvals in one digital chain",
      "Auto-deleting completed work orders",
      "Auto-assigning technicians to jobs"
    ],
    correct: 1,
    explain: "Permit-to-Work flows touch HSE, Maintenance, and Operations every day; paper-based today; high-error-rate; massive cycle-time win when digital. Build this first."
  },
  {
    q: "In the 5-step process-mapping protocol, what is the FIRST thing you do?",
    options: [
      "Sketch the swim-lane",
      "Open Microsoft Visio",
      "Walk the process — talk to the people who actually do it",
      "Score automation candidates"
    ],
    correct: 2,
    explain: "Walking the process — talking to the people who do it daily — surfaces the shadow Excel, the rework loops, and the friction managers don't see. Always step 1."
  },
  {
    q: "Which best summarises when process REDESIGN beats automation?",
    options: [
      "Never — always automate first.",
      "When the friction is the rule itself (e.g. dual approvals for tiny amounts) — fix the policy, don't just automate the dual signature.",
      "Process redesign is too slow.",
      "Redesign only on Fridays."
    ],
    correct: 1,
    explain: "If a step exists because of an unhelpful policy, automating that step entrenches the policy. Sometimes the right move is to delete the step, not automate it."
  }
];
let current = 0;
let answers = new Array(questions.length).fill(null);
const quizEl = document.getElementById('quiz');
const barEl = document.getElementById('bar');
const resultsEl = document.getElementById('results');
function render() {
  if (current >= questions.length) { showResults(); return; }
  const q = questions[current];
  const selected = answers[current];
  const answered = selected !== null;
  quizEl.innerHTML = `<div class="question active">
    <div class="q-meta">Question ${current + 1} of ${questions.length}</div>
    <div class="q-text">${q.q}</div>
    <ul class="options">${q.options.map((opt, i) => {
      let cls = 'option';
      if (answered) { cls += ' disabled'; if (i === q.correct) cls += ' correct'; else if (i === selected) cls += ' wrong'; }
      else if (selected === i) cls += ' selected';
      return `<li class="${cls}" onclick="pick(${i})">${String.fromCharCode(65 + i)}. ${opt}</li>`;
    }).join('')}</ul>
    ${answered ? `<div class="feedback ${selected === q.correct ? 'correct' : 'wrong'} show"><strong>${selected === q.correct ? '✓ Correct' : '✗ Not quite'}</strong>${q.explain}</div>` : ''}
    <div class="nav">
      <button class="secondary" onclick="prev()" ${current === 0 ? 'disabled' : ''}>← Previous</button>
      <button onclick="next()" ${!answered ? 'disabled' : ''}>${current === questions.length - 1 ? 'See Results →' : 'Next →'}</button>
    </div></div>`;
  barEl.style.width = ((current + (answered ? 1 : 0)) / questions.length * 100) + '%';
}
function pick(i) { if (answers[current] !== null) return; answers[current] = i; render(); }
function next() { if (answers[current] === null) return; current++; if (current >= questions.length) showResults(); else render(); }
function prev() { if (current > 0) { current--; render(); } }
function showResults() {
  quizEl.style.display = 'none';
  resultsEl.classList.add('show');
  const score = answers.filter((a, i) => a === questions[i].correct).length;
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scoreFrac').textContent = score + ' / ' + questions.length;
  let verdict;
  if (pct === 100) verdict = "Perfect — you can map any process clearly and spot every automation opportunity.";
  else if (pct >= 80) verdict = "Strong — you have the discipline to map well; review missed items and try a real process.";
  else if (pct >= 60) verdict = "Solid foundation — re-read Module 01 walkthroughs for your function before mapping real work.";
  else verdict = "Worth a careful re-read of Module 01 — process mapping skill compounds everything else.";
  document.getElementById('verdictText').textContent = verdict;
  document.getElementById('reviewList').innerHTML = questions.map((q, i) => {
    const ok = answers[i] === q.correct;
    return `<div class="review-item"><span class="review-mark">${ok ? '✓' : '✗'}</span><div><strong>Q${i+1}.</strong> ${q.q.substring(0, 90)}${q.q.length > 90 ? '…' : ''}</div></div>`;
  }).join('');
  barEl.style.width = '100%';
}
function restart() { current = 0; answers = new Array(questions.length).fill(null); quizEl.style.display = 'block'; resultsEl.classList.remove('show'); render(); }
render();
</script>
</body>
</html>
